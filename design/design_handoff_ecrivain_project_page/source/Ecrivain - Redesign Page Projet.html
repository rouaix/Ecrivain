<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Écrivain — Redesign · Page projet HAINDAL</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: Inter, "Helvetica Neue", system-ui, sans-serif;
    background: #f0eee9;
    color: #2a2520;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="direction-a-manuscrit.jsx"></script>
<script type="text/babel" src="direction-b-bibliotheque.jsx"></script>
<script type="text/babel" src="direction-c-atelier.jsx"></script>
<script type="text/babel" src="direction-d-studio-nuit.jsx"></script>

<script type="text/babel" data-presets="react">
  const W = 1480;
  const H = 940;

  function App() {
    const { ManuscritDirection, BibliothequeDirection, AtelierDirection, StudioNuitDirection } = window;
    return (
      <DesignCanvas>
        <DCSection
          id="ecrivain"
          title="Écrivain · Redesign de la page projet"
          subtitle="HAINDAL · 4 directions littéraires & élégantes — mêmes données, traitement différent"
        >
          <DCArtboard id="a" label="A · Manuscrit — papier crème, EB Garamond" width={W} height={H}>
            <ManuscritDirection />
          </DCArtboard>
          <DCArtboard id="b" label="B · Bibliothèque moderne — outil pro littéraire" width={W} height={H}>
            <BibliothequeDirection />
          </DCArtboard>
          <DCArtboard id="c" label="C · Atelier — terre cuite, couverture mise en avant" width={W} height={H}>
            <AtelierDirection />
          </DCArtboard>
          <DCArtboard id="d" label="D · Studio nuit — mode sombre par défaut" width={W} height={H}>
            <StudioNuitDirection />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
