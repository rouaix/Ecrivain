<div class="edit-page-layout">
    <div class="edit-header">
        <h2><i class="fas fa-search" aria-hidden="true"></i> Recherche</h2>
    </div>

    <div class="search-page">
        <form method="get" action="{{ @base }}/search" class="search-form" id="search-form">
            <div class="search-input-row">
                <input type="text" name="q" value="{{ @q | esc }}" placeholder="Rechercher dans tous vos textes…"
                    class="input-control search-input" autofocus autocomplete="off">
                <select name="project_id" class="input-control search-scope">
                    <option value="">Tous les projets</option>
                    <repeat group="{{ @projects }}" value="{{ @proj }}">
                        <option value="{{ @proj.id }}" {{ ((int)@projectId==(int)@proj.id && @projectId>0) ? 'selected'
                            : '' }}>
                            {{ @proj.title | esc }}
                        </option>
                    </repeat>
                </select>
                <button type="submit" class="button primary">Rechercher</button>
            </div>

            <div class="search-filters">
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type="
                    class="search-filter-pill {{ @activeType==='' ? 'is-active' : '' }}">
                    <i class="fas fa-border-all" aria-hidden="true"></i> Tout
                </a>
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type=chapitre"
                    class="search-filter-pill {{ @activeType==='chapitre' ? 'is-active' : '' }}">
                    <i class="fas fa-book-open" aria-hidden="true"></i> Chapitres
                </a>
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type=acte"
                    class="search-filter-pill {{ @activeType==='acte' ? 'is-active' : '' }}">
                    <i class="fas fa-layer-group" aria-hidden="true"></i> Actes
                </a>
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type=note"
                    class="search-filter-pill {{ @activeType==='note' ? 'is-active' : '' }}">
                    <i class="fas fa-sticky-note" aria-hidden="true"></i> Notes
                </a>
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type=personnage"
                    class="search-filter-pill {{ @activeType==='personnage' ? 'is-active' : '' }}">
                    <i class="fas fa-user" aria-hidden="true"></i> Personnages
                </a>
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type=element"
                    class="search-filter-pill {{ @activeType==='element' ? 'is-active' : '' }}">
                    <i class="fas fa-puzzle-piece" aria-hidden="true"></i> Éléments
                </a>
                <a href="{{ @base }}/search?q={{ @q | esc }}&project_id={{ @projectId }}&dialogues={{ @dialogues ? 1 : 0 }}&type=glossaire"
                    class="search-filter-pill {{ @activeType==='glossaire' ? 'is-active' : '' }}">
                    <i class="fas fa-book" aria-hidden="true"></i> Glossaire
                </a>

                <label class="search-filter-dialogues" style="display: none">
                    <input type="checkbox" name="dialogues" value="1" id="search-dialogues" {{ @dialogues ? 'checked'
                        : '' }}>
                    <i class="fas fa-quote-left" aria-hidden="true"></i>
                    Dialogues uniquement
                </label>
                <input type="hidden" name="type" value="{{ @activeType | esc }}">
            </div>
        </form>

        <check if="{{ !empty(@error) }}">
            <div class="alert-warning">{{ @error | esc }}</div>
        </check>

        <check if="{{ !empty(@q) && empty(@error) }}">
            <check if="{{ empty(@results) }}">
                <div class="search-empty">
                    <i class="fas fa-search" aria-hidden="true" style="font-size:2rem;opacity:.3;"></i>
                    <p>Aucun résultat pour « <strong>{{ @q | esc }}</strong> ».</p>
                </div>
            </check>
            <check if="{{ !empty(@results) }}">
                <p class="search-count">
                    <strong>{{ count(@results) }}</strong> résultat(s) pour « {{ @q | esc }} »
                </p>
                <div class="search-results">
                    <repeat group="{{ @results }}" value="{{ @res }}">
                        <a href="{{ @base }}{{ @res.url }}" class="search-result-card">
                            <div class="search-result-type">
                                <i class="fas {{ @res.icon }}" aria-hidden="true"></i>
                                {{ @res.type }}
                            </div>
                            <div class="search-result-body">
                                <check if="{{ !empty(@res.context) }}">
                                    <div class="search-result-context">{{ @res.context | esc }}</div>
                                </check>
                                <div class="search-result-title">{{ @res.title | esc }}</div>
                                <check if="{{ !empty(@res.excerpt) }}">
                                    <div class="search-result-excerpt">{{ @res.excerpt | raw }}</div>
                                </check>
                            </div>
                        </a>
                    </repeat>
                </div>
            </check>
        </check>
    </div>
</div>

<script nonce="{{ @nonce }}">
    document.getElementById('search-dialogues').addEventListener('change', function () {
        this.form.submit();
    });
</script>
