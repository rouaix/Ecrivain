<div class="edit-page-layout">

    <set pageIcon="sticky-note" />
    <set pageTitle="Notes" />
    <set backUrl="{{ @base.'/project/'.@project.id }}" />
    <set createUrl="{{ @base.'/project/'.@project.id.'/note/edit' }}" />
    <set createTitle="Nouvelle note" />
    <include href="_page-header.html" />

    <check if="{{ count(@notes) == 0 }}">
        <set emptyIcon="sticky-note" />
        <set emptyMessage="Aucune note créée pour ce projet." />
        <include href="_empty-state.html" />
    </check>

    <check if="{{ count(@notes) > 0 }}">
        <div class="notes-layout mt-20">

            <!-- Liste des notes -->
            <div class="notes-list-col" id="notesList">
                <repeat group="{{ @notes }}" value="{{ @note }}">
                    <div class="note-list-item" data-id="{{ @note.id }}" tabindex="0"
                        title="{{ strip_tags(@note.title) ?: 'Note sans titre' | esc }}">
                        <div class="note-list-color note-color-{{ @note.colorIndex }}"></div>
                        <div class="note-list-body">
                            <div class="note-list-title">{{ strip_tags(@note.title) ?: 'Note sans titre' | esc }}</div>
                            <div class="note-list-meta">{{ @note.wc }} mot{{ @note.wc != 1 ? 's' : '' }}</div>
                        </div>
                        <div class="note-list-actions">
                            <input type="checkbox" class="export-toggle-list" data-type="note"
                                data-id="{{ @note.id }}" data-pid="{{ @project.id }}"
                                {{ @note.is_exported ? 'checked' : '' }}
                                title="Inclure dans l'export" onclick="event.stopPropagation()">
                            <check if="{{ @isOwner }}">
                                <a href="{{ @base }}/project/{{ @project.id }}/note/edit?id={{ @note.id }}"
                                    class="button small" title="Modifier" onclick="event.stopPropagation()">
                                    <i class="fas fa-edit" aria-hidden="true"></i>
                                </a>
                                <a href="{{ @base }}/note/{{ @note.id }}/delete" class="button small delete js-confirm"
                                    data-confirm="Supprimer cette note ?" title="Supprimer"
                                    onclick="event.stopPropagation()">
                                    <i class="fas fa-trash" aria-hidden="true"></i>
                                </a>
                            </check>
                        </div>
                    </div>
                </repeat>
            </div>

            <!-- Panneau d'aperçu (Pro uniquement) -->
            <div class="notes-preview-col" id="notesPreview" aria-live="polite">
                <div class="notes-preview-empty" id="notesPreviewEmpty">
                    <i class="fas fa-hand-pointer" aria-hidden="true"></i>
                    <p>Sélectionnez une note pour l'apercevoir</p>
                </div>
                <div class="notes-preview-content" id="notesPreviewContent" style="display:none">
                    <div class="notes-preview-header">
                        <h3 id="notesPreviewTitle"></h3>
                        <a id="notesPreviewEdit" href="#" class="button small" title="Modifier">
                            <i class="fas fa-edit" aria-hidden="true"></i>
                        </a>
                    </div>
                    <div class="notes-preview-body ql-editor" id="notesPreviewBody"></div>
                    <div class="notes-preview-comment" id="notesPreviewComment" style="display:none">
                        <div class="notes-preview-comment-label">
                            <i class="fas fa-comment" aria-hidden="true"></i> Remarques
                        </div>
                        <div class="ql-editor" id="notesPreviewCommentBody"></div>
                    </div>
                </div>
            </div>

        </div>
    </check>

</div>

<script type="application/json" id="notesJson">{{ @notesJson | raw }}</script>

<script nonce="{{ @nonce }}">
    (function () {
        var BASE = '{{ @base }}';
        var PID = '{{ @project.id }}';
        var IS_OWNER = {{ @isOwner ?'true' : 'false'
    }};
    var IS_PRO = document.body.classList.contains('ui-pro');

    // Parse embedded JSON
    var notesData = {};
    try {
        var raw = JSON.parse(document.getElementById('notesJson').textContent);
        raw.forEach(function (n) { notesData[n.id] = n; });
    } catch (e) { }

    // Preview elements
    var previewEmpty = document.getElementById('notesPreviewEmpty');
    var previewContent = document.getElementById('notesPreviewContent');
    var previewTitle = document.getElementById('notesPreviewTitle');
    var previewBody = document.getElementById('notesPreviewBody');
    var previewEdit = document.getElementById('notesPreviewEdit');
    var previewComment = document.getElementById('notesPreviewComment');
    var previewCommentBody = document.getElementById('notesPreviewCommentBody');

    function showPreview(id) {
        var note = notesData[id];
        if (!note) return;

        previewTitle.textContent = note.title;
        previewBody.innerHTML = note.content || '<p class="text-muted-para">Aucun contenu.</p>';
        if (IS_OWNER) {
            previewEdit.href = BASE + '/project/' + PID + '/note/edit?id=' + id;
            previewEdit.style.display = '';
        } else {
            previewEdit.style.display = 'none';
        }

        if (note.comment && note.comment.replace(/<[^>]*>/g, '').trim()) {
            previewCommentBody.innerHTML = note.comment;
            previewComment.style.display = '';
        } else {
            previewComment.style.display = 'none';
        }

        previewEmpty.style.display = 'none';
        previewContent.style.display = '';
    }

    document.querySelectorAll('.export-toggle-list').forEach(function (cb) {
        cb.addEventListener('change', function () {
            var pid = this.dataset.pid;
            var id = parseInt(this.dataset.id, 10);
            var type = this.dataset.type;
            var checked = this.checked;
            fetch(BASE + '/project/' + pid + '/export-toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': window.CSRF_TOKEN },
                body: JSON.stringify({ id: id, type: type, is_exported: checked ? 1 : 0 })
            }).then(function (r) {
                if (!r.ok) { cb.checked = !checked; }
            });
        });
    });

    // Bind list items
    document.querySelectorAll('.note-list-item').forEach(function (item) {
        item.addEventListener('click', function () {
            var id = parseInt(this.dataset.id, 10);

            // In classic mode: navigate to edit
            if (!IS_PRO) {
                window.location.href = BASE + '/project/' + PID + '/note/edit?id=' + id;
                return;
            }

            // In Pro mode: show preview
            document.querySelectorAll('.note-list-item').forEach(function (el) {
                el.classList.remove('is-active');
            });
            this.classList.add('is-active');
            showPreview(id);
        });

        item.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                this.click();
            }
        });
    });
    }) ();
</script>
