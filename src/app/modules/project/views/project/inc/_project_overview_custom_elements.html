    <!-- ── Éléments personnalisés ── -->
    <repeat group="{{ @customElementPanels }}" value="{{ @cep }}">
      <details class="panel ms-panel" id="panel-element-{{ @cep.id }}" data-persist="true">
        <summary>
          <span class="ms-panel-arrow">›</span>
          {{ @cep.label_plural }}
          <span class="panel-count">{{ @cep.count }}</span>
          <check if="{{ @isOwner }}">
            <div class="ms-panel-add">
              <a class="button small" href="{{ @base }}/project/{{ @project.id }}/element/create?type={{ @cep.id }}" title="Nouveau"><i class="fas fa-plus" aria-hidden="true"></i></a>
            </div>
          </check>
        </summary>
        <div class="section-group-block" data-type="elements">
          <check if="{{ @cep.count > 0 }}">
            <true>
              <table class="ms-chapter-table elements">
                <tbody>
                  <repeat group="{{ @cep.elements }}" value="{{ @ce }}">
                    <tr data-id="{{ @ce.id }}">
                      <td class="ms-hidden-cell">
                        <input type="checkbox" class="export-toggle" data-type="element" data-id="{{ @ce.id }}" {{ @ce.is_exported_attr }}>
                        <input type="number" class="order-input" data-type="element" data-id="{{ @ce.id }}" value="{{ @ce.order_index + 1 }}" min="1" max="999">
                      </td>
                      <td class="ms-status-cell">
                        <span class="ms-status {{ @ce.total_wc == 0 ? 'ms-status--empty' : (!empty(@ce.resume) ? 'ms-status--done' : 'ms-status--writing') }}"></span>
                      </td>
                      <td class="ms-title-cell">
                        <a href="{{ @base }}/element/{{ @ce.id }}" class="ms-chapter-link">{{ @ce.title }}</a>
                        <check if="{{ isset(@ce.subs) && count(@ce.subs) > 0 }}">
                          <span class="ms-sub-marker"><span class="collapse-toggle" data-target="{{ @ce.id }}">▼</span> {{ count(@ce.subs) }}</span>
                        </check>
                      </td>
                      <td class="ms-words-cell">{{ @ce.total_wc > 0 ? @ce.total_wc.' m' : '—' }}</td>
                      <td class="ms-actions-cell">
                        <a class="button small" href="{{ @base }}/project/{{ @project.id }}/element/create?type={{ @cep.id }}&parent_id={{ @ce.id }}" title="+ Sous-élément"><i class="fas fa-plus" aria-hidden="true"></i></a>
                        <button class="button small preview-btn" data-type="element" data-id="{{ @ce.id }}" title="Prévisualiser"><i class="fas fa-eye" aria-hidden="true"></i></button>
                        <check if="{{ !@isOwner }}">
                          <button class="button small propose-btn" data-type="element" data-id="{{ @ce.id }}" data-title="{{ @ce.title | esc }}" title="Proposer"><i class="fas fa-paper-plane" aria-hidden="true"></i></button>
                        </check>
                        <a class="button small" href="{{ @base }}/element/{{ @ce.id }}" title="Éditer"><i class="fas fa-edit" aria-hidden="true"></i></a>
                        <check if="{{ isset(@ce.subs) && count(@ce.subs) > 0 }}">
                          <button class="button small ai-element-summary-btn" data-id="{{ @ce.id }}" title="Résumé IA"><i class="fas fa-magic" aria-hidden="true"></i></button>
                        </check>
                        <check if="{{ !isset(@ce.subs) || count(@ce.subs) == 0 }}">
                          <a class="button small delete js-confirm" href="{{ @base }}/element/{{ @ce.id }}/delete" data-confirm="Supprimer cet élément ?" title="Supprimer"><i class="fas fa-trash" aria-hidden="true"></i></a>
                        </check>
                      </td>
                    </tr>
                    <repeat group="{{ @ce.subs }}" value="{{ @sub }}">
                      <tr data-id="{{ @sub.id }}" class="sub-chapter sub-of-{{ @ce.id }} ms-sub-row">
                        <td class="ms-hidden-cell">
                          <input type="checkbox" class="export-toggle" data-type="element" data-id="{{ @sub.id }}" {{ @sub.is_exported_attr }}>
                          <input type="number" class="order-input" data-type="element" data-id="{{ @sub.id }}" value="{{ @sub.order_index + 1 }}" min="1" max="999">
                        </td>
                        <td class="ms-status-cell ms-sub-indent"><span class="ms-status {{ @sub.wc == 0 ? 'ms-status--empty' : 'ms-status--writing' }}"></span></td>
                        <td class="ms-title-cell ms-sub-indent">
                          <a href="{{ @base }}/element/{{ @sub.id }}" class="ms-chapter-link ms-sub-link">{{ @sub.title }}</a>
                        </td>
                        <td class="ms-words-cell">{{ @sub.wc > 0 ? @sub.wc.' m' : '—' }}</td>
                        <td class="ms-actions-cell">
                          <button class="button small preview-btn" data-type="element" data-id="{{ @sub.id }}" title="Prévisualiser"><i class="fas fa-eye" aria-hidden="true"></i></button>
                          <check if="{{ !@isOwner }}">
                            <button class="button small propose-btn" data-type="element" data-id="{{ @sub.id }}" data-title="{{ @sub.title | esc }}" title="Proposer"><i class="fas fa-paper-plane" aria-hidden="true"></i></button>
                          </check>
                          <a class="button small" href="{{ @base }}/element/{{ @sub.id }}" title="Éditer"><i class="fas fa-edit" aria-hidden="true"></i></a>
                          <a class="button small delete js-confirm" href="{{ @base }}/element/{{ @sub.id }}/delete" data-confirm="Supprimer ce sous-élément ?" title="Supprimer"><i class="fas fa-trash" aria-hidden="true"></i></a>
                        </td>
                      </tr>
                    </repeat>
                  </repeat>
                </tbody>
              </table>
            </true>
            <false><p class="panel-empty">Aucun élément créé.</p></false>
          </check>
        </div>
      </details>
    </repeat>
