<!-- Glossary Panel -->

<details class="panel" id="panel-glossary" data-persist="true">

  <summary>Lexique <span class="panel-count">{{ @stats.glossary_count }}</span></summary>

  <check if="{{ empty(@glossaryEntries) }}">

    <true>

      <p class="panel-empty">Aucun terme d&eacute;fini.</p>

    </true>

    <false>

      <ul class="glossary-list">

        <repeat group="{{ @glossaryEntries }}" value="{{ @gentry }}">

          <li>

            <span class="glossary-list-term">{{ @gentry.term }}</span>

            <check if="{{ @gentry.definition }}">

              <span class="glossary-list-def">{{ @gentry.definition | truncate(80) }}</span>

            </check>

          </li>

        </repeat>

      </ul>

    </false>

  </check>

  <div class="panel-actions panel-actions-row">

    <a class="button small" href="{{ @base }}/project/{{ @project.id }}/glossary" title="G&eacute;rer le lexique"><i class="fas fa-book" aria-hidden="true"></i></a>

    <a class="button small" href="{{ @base }}/project/{{ @project.id }}/glossary/create" title="Ajouter un terme"><i class="fas fa-plus" aria-hidden="true"></i></a>

  </div>

</details>

</content>
