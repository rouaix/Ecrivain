<div class="edit-page-layout">

  <div class="edit-header">
    <h2>Scénario {{ @note.title }}</h2>
    <a href="{{ @base }}/project/{{ @project.id }}" class="button" title="Retour au projet" title="Retour au projet">
      <i class="fas fa-arrow-left" aria-hidden="true"></i>
    </a>
  </div>

  <label class="synopsis-export-toggle" title="Inclure dans l'export, la lecture et la mindmap">
    <input type="checkbox" id="exportToggle" {{ (@note.is_exported ?? 1) ? 'checked' : '' }}>
    Inclure dans l'export
  </label>

  <check if="{{ @saved }}">
    <true>
      <div class="success edit-success" class="mb-15">
        <i class="fas fa-check" aria-hidden="true"></i> Scénario sauvegardé.
      </div>
    </true>
  </check>

  <form id="scenariste-save-form">
    <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">

    <div class="edit-card">

      <!-- Title -->
      <div class="edit-card-section">
        <h3>Informations</h3>
        <div class="editor-grid-row">
          <div class="form-group">
            <label for="episode-title">Titre de l'épisode</label>
            <input type="text" id="episode-title" name="title" value="{{ @note.title }}" class="input-control">
          </div>
          <check if="{{ @meta.saison }}">
            <true>
              <div class="form-group">
                <label>Référence</label>
                <div class="input-control" class="d-flex gap-8 align-center">
                  <strong>S{{ @meta.saison }}E{{ @meta.episode }}</strong>
                  <check if="{{ @meta.genre }}">
                    <true><span class="text-sm text-muted">{{ @meta.genre }}</span></true>
                  </check>
                </div>
              </div>
            </true>
          </check>
        </div>
      </div>

      <!-- Screenplay content -->
      <div class="edit-card-section">
        <h3>Scénario</h3>
        <div class="form-group">
          <label>
            <span class="form-hint"><kbd>Ctrl+S</kbd> pour sauvegarder</span>
            <span id="word-count" class="form-hint" class="ml-auto">0 mots</span>
          </label>
          <div class="clearfix"></div>
          <div id="screenplay-editor" class="editor-surface">{{ @note.content | raw }}</div>
          <input type="hidden" name="content" id="content-input">
        </div>
      </div>

      <!-- Actions -->

      <div class="edit-actions">
        <input type="submit" id="save-btn" value="Enregistrer" class="button primary large" title="Enregistrer">
        <span id="save-status" style="font-size:.85rem;color:var(--success-color,#16a34a);"></span>
        <a href="{{ @base }}/scenariste/{{ @note.id }}/download" class="button secondary" title="Télécharger .md">
          <i class="fas fa-download" aria-hidden="true"></i>
        </a>
        <a href="{{ @base }}/scenariste/{{ @note.id }}/delete" class="button delete"
          onclick="return confirm('Supprimer ce scénario définitivement ?')" title="Supprimer">
          <i class="fas fa-trash" aria-hidden="true"></i>
        </a>
      </div>

    </div>
  </form>

</div>

<script nonce="{{ @nonce }}">
  document.addEventListener('DOMContentLoaded', function () {
    var noteId = {{ @note.id
  }};
  var csrfToken = '{{ @csrfToken }}';
  var base = '{{ @base }}';

  var wordCountEl = document.getElementById('word-count');
  var saveStatus = document.getElementById('save-status');
  var saveBtn = document.getElementById('save-btn');
  var contentInput = document.getElementById('content-input');

  // Read initial HTML from the div BEFORE QuillTools.init (same pattern as chapter/edit)
  var editorEl = document.getElementById('screenplay-editor');
  var initialContentHtml = editorEl ? (editorEl.innerHTML || '') : '';

  // --- Init Quill ---
  QuillTools.init('#screenplay-editor', {
    inputSelector: '#content-input',
    baseUrl: base,
    csrfToken: csrfToken,
    contextId: noteId,
    contextType: 'note'
  });

  // Helper: decode HTML entities once
  function decodeHtml(html) {
    var txt = document.createElement('textarea');
    txt.innerHTML = html;
    return txt.value;
  }

  // Helper: decode up to `depth` times (stops early if stable)
  function decodeHtmlDeep(html, depth) {
    var current = html;
    for (var i = 0; i < depth; i++) {
      var decoded = decodeHtml(current);
      if (decoded === current) break;
      current = decoded;
    }
    return current;
  }

  // Strip legacy <pre><code> wrappers (old AI-generated content)
  initialContentHtml = initialContentHtml.replace(
    /<pre[^>]*>(?:<code[^>]*>)?([\s\S]*?)(?:<\/code>)?<\/pre>/gi,
    function (m, inner) {
      var text = inner.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
      return text.split(/\r?\n/).filter(function (l) { return l.trim(); })
        .map(function (l) { return '<p>' + l + '</p>'; }).join('');
    }
  );

  var decodedContent = decodeHtmlDeep(initialContentHtml, 2);
  if (decodedContent && QuillTools.quill && decodedContent !== QuillTools.quill.root.innerHTML) {
    QuillTools.quill.clipboard.dangerouslyPasteHTML(decodedContent);
  }

  // Track baseline for auto-save (set after paste so text-change already fired)
  var lastSaved = contentInput ? contentInput.value : '';

  // --- Word count ---
  function updateWordCount() {
    if (!QuillTools.quill || !wordCountEl) return;
    var text = QuillTools.quill.getText().trim();
    var words = text ? text.split(/\s+/).filter(function (w) { return w.length > 0; }) : [];
    wordCountEl.textContent = words.length.toLocaleString('fr-FR') + ' mots';
  }
  if (QuillTools.quill) {
    QuillTools.quill.on('text-change', function () { updateWordCount(); });
    updateWordCount();
  }

  // --- Save ---
  function save() {
    saveStatus.textContent = 'Sauvegarde\u2026';
    saveBtn.disabled = true;

    var fd = new FormData();
    fd.append('csrf_token', csrfToken);
    fd.append('title', document.getElementById('episode-title').value);
    fd.append('content', contentInput ? contentInput.value : '');

    fetch(base + '/scenariste/' + noteId + '/save', {
      method: 'POST',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      body: fd
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        saveBtn.disabled = false;
        if (data.success) {
          saveStatus.textContent = '\u2713 Sauvegard\u00e9';
          setTimeout(function () { saveStatus.textContent = ''; }, 3000);
        } else {
          saveStatus.textContent = '\u2717 Erreur';
        }
      })
      .catch(function () {
        saveBtn.disabled = false;
        saveStatus.textContent = '\u2717 Erreur r\u00e9seau';
      });
  }

  var exportToggle = document.getElementById('exportToggle');
  if (exportToggle) {
    exportToggle.addEventListener('change', function () {
      fetch('{{ @base }}/project/{{ @project.id }}/export-toggle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: {{ @note.id }}, type: 'scenario', is_exported: this.checked ? 1 : 0 })
      }).then(function (r) {
          if (!r.ok) { exportToggle.checked = !exportToggle.checked; }
        });
    });
  }

  var form = document.getElementById('scenariste-save-form');
  if (form) form.addEventListener('submit', function (e) { e.preventDefault(); save(); });

  // Ctrl+S
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
  });

  // Auto-save every 2 minutes if changed
  setInterval(function () {
    if (contentInput && contentInput.value !== lastSaved) {
      lastSaved = contentInput.value;
      save();
    }
  }, 120000);
  });
</script>
