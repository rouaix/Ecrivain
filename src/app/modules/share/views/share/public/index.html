<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>{{ @title | esc }}</title>
    <link rel="stylesheet" href="{{ @base }}/public/style.css?v=58">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ @base }}/public/css/themes/theme-default.css">
</head>
<body class="theme-default">

<div class="share-banner">
    <i class="fas fa-lock" aria-hidden="true"></i> Accès partagé en lecture seule
</div>

<div class="share-public-header">
    <h1>{{ @title | esc }}</h1>
    <p>Sélectionnez un projet pour le consulter.</p>
</div>

<div class="share-project-grid">
    <repeat group="{{ @projects }}" value="{{ @proj }}">
        <div class="share-project-card">
            <h2>{{ @proj.title | esc }}</h2>
            <p>{{ @proj.description | esc }}</p>
            <div class="share-project-modes">
                <a href="{{ @base }}/s/{{ @token }}/{{ @proj.id }}/lecture" class="button">
                    <i class="fas fa-book-open" aria-hidden="true"></i> Lecture
                </a>
                <a href="{{ @base }}/s/{{ @token }}/{{ @proj.id }}/relecture" class="button secondary">
                    <i class="fas fa-glasses" aria-hidden="true"></i> Relecture
                </a>
                <a href="{{ @base }}/s/{{ @token }}/{{ @proj.id }}/mindmap" class="button secondary">
                    <i class="fas fa-project-diagram" aria-hidden="true"></i> Carte mentale
                </a>
            </div>
        </div>
    </repeat>
</div>

</body>
</html>
