<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>{{ @title | esc }}</title>
    <link rel="stylesheet" href="{{ @base }}/public/style.css?v=58">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ @base }}/public/css/themes/theme-default.css">
</head>
<body class="theme-default">

<div class="share-banner">
    <i class="fas fa-lock" aria-hidden="true"></i> Accès partagé en lecture seule
</div>

<div class="share-project-view">
    <check if="{{ @coverImage }}">
        <img src="{{ @coverImage }}" alt="Couverture" class="share-project-cover">
    </check>

    <h1 class="share-project-title">{{ @project.title | esc }}</h1>
    <p class="share-project-desc">{{ @project.description | esc }}</p>

    <div class="share-nav">
        <a href="{{ @base }}/s/{{ @token }}/{{ @project.id }}/lecture" class="button">
            <i class="fas fa-book-open" aria-hidden="true"></i> Lecture
        </a>
        <a href="{{ @base }}/s/{{ @token }}/{{ @project.id }}/relecture" class="button secondary">
            <i class="fas fa-glasses" aria-hidden="true"></i> Relecture
        </a>
        <a href="{{ @base }}/s/{{ @token }}/{{ @project.id }}/mindmap" class="button secondary">
            <i class="fas fa-project-diagram" aria-hidden="true"></i> Carte mentale
        </a>
        <a href="{{ @base }}/s/{{ @token }}" class="button secondary">
            <i class="fas fa-arrow-left" aria-hidden="true"></i> Tous les projets
        </a>
    </div>
</div>

</body>
</html>
