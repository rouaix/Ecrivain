<div class="edit-page-layout">

    <set pageIcon="puzzle-piece" />
    <set pageTitle="{{ @config.label_plural ?? 'Éléments' }}" />
    <set backUrl="{{ @base.'/project/'.@project.id }}" />
    <set createUrl="{{ @base.'/project/'.@project.id.'/element/create?type='.@templateElement.id }}" />
    <set createTitle="Nouvel élément" />
    <include href="_page-header.html" />

    <check if="{{ count(@topLevel) == 0 }}">
        <set emptyIcon="puzzle-piece" />
        <set emptyMessage="Aucun élément pour l'instant." />
        <set emptyCreateUrl="{{ @base.'/project/'.@project.id.'/element/create?type='.@templateElement.id }}" />
        <set emptyCreateLabel="Créer le premier" />
        <include href="_empty-state.html" />
    </check>

    <check if="{{ count(@topLevel) > 0 }}">
        <div class="elements-layout mt-20">

            <!-- Liste des éléments -->
            <div class="elements-list-col" id="elementsList">
                <repeat group="{{ @topLevel }}" value="{{ @el }}">

                    <div class="element-list-item" data-id="{{ @el.id }}" tabindex="0">
                        <div class="element-list-body">
                            <div class="element-list-title">{{ @el.title | esc }}</div>
                            <check if="{{ @el.sub_count > 0 }}">
                                <div class="element-list-meta">{{ @el.sub_count }} sous-élément(s)</div>
                            </check>
                            <check if="{{ @el.resume }}">
                                <div class="element-list-resume">{{ @el.resume | esc }}</div>
                            </check>
                        </div>
                        <check if="{{ @el.sub_count > 0 }}">
                            <button type="button" class="button small element-ai-btn ai-element-summary-btn"
                                data-id="{{ @el.id }}" title="Générer un résumé IA"
                                onclick="event.stopPropagation()">
                                <i class="fas fa-magic" aria-hidden="true"></i>
                            </button>
                        </check>
                        <div class="element-list-actions">
                            <input type="checkbox" class="export-toggle-list" data-type="element"
                                data-id="{{ @el.id }}" data-pid="{{ @project.id }}"
                                {{ @el.is_exported ? 'checked' : '' }}
                                title="Inclure dans l'export" onclick="event.stopPropagation()">
                            <check if="{{ @el.sub_count > 0 }}">
                                <button type="button" class="button small js-expand-subs"
                                    data-target="subs-{{ @el.id }}" title="Voir les sous-éléments"
                                    onclick="event.stopPropagation()">
                                    <i class="fas fa-chevron-down" aria-hidden="true"></i>
                                </button>
                            </check>
                            <a href="{{ @base }}/element/{{ @el.id }}" class="button small" title="Modifier"
                                onclick="event.stopPropagation()">
                                <i class="fas fa-edit" aria-hidden="true"></i>
                            </a>
                            <check if="{{ @el.sub_count == 0 }}">
                                <a href="{{ @base }}/element/{{ @el.id }}/delete" class="button small delete js-confirm"
                                    data-confirm="Supprimer cet élément ?" title="Supprimer"
                                    onclick="event.stopPropagation()">
                                    <i class="fas fa-trash" aria-hidden="true"></i>
                                </a>
                            </check>
                        </div>
                    </div>

                    <check if="{{ @el.sub_count > 0 }}">
                        <div class="element-sub-list" id="subs-{{ @el.id }}" style="display:none">
                            <repeat group="{{ @el.subs }}" value="{{ @sub }}">
                                <div class="element-sub-item" data-id="{{ @sub.id }}" tabindex="0">
                                    <span class="element-sub-title">{{ @sub.title | esc }}</span>
                                    <div class="element-sub-actions">
                                        <input type="checkbox" class="export-toggle-list" data-type="element"
                                            data-id="{{ @sub.id }}" data-pid="{{ @project.id }}"
                                            {{ @sub.is_exported ? 'checked' : '' }}
                                            title="Inclure dans l'export" onclick="event.stopPropagation()">
                                        <a href="{{ @base }}/element/{{ @sub.id }}" class="button small"
                                            title="Modifier" onclick="event.stopPropagation()">
                                            <i class="fas fa-edit" aria-hidden="true"></i>
                                        </a>
                                        <a href="{{ @base }}/element/{{ @sub.id }}/delete"
                                            class="button small delete js-confirm"
                                            data-confirm="Supprimer ce sous-élément ?" title="Supprimer"
                                            onclick="event.stopPropagation()">
                                            <i class="fas fa-trash" aria-hidden="true"></i>
                                        </a>
                                    </div>
                                </div>
                            </repeat>
                            <div class="element-sub-add">
                                <a href="{{ @base }}/project/{{ @project.id }}/element/create?type={{ @templateElement.id }}&parent_id={{ @el.id }}"
                                    class="button small secondary" title="Ajouter un sous-élément">
                                    <i class="fas fa-plus" aria-hidden="true"></i>
                                </a>
                            </div>
                        </div>
                    </check>

                </repeat>
            </div>

            <!-- Panneau d'aperçu (Pro uniquement) -->
            <div class="elements-preview-col" id="elementsPreview" aria-live="polite">
                <div class="elements-preview-empty" id="elementsPreviewEmpty">
                    <i class="fas fa-hand-pointer" aria-hidden="true"></i>
                    <p>Sélectionnez un élément pour l'apercevoir</p>
                </div>
                <div class="elements-preview-content" id="elementsPreviewContent" style="display:none">
                    <div class="elements-preview-header">
                        <div class="elements-preview-header-text">
                            <div class="elements-preview-breadcrumb" id="elementsPreviewBreadcrumb"
                                style="display:none"></div>
                            <h3 id="elementsPreviewTitle"></h3>
                        </div>
                        <a id="elementsPreviewEdit" href="#" class="button small" title="Modifier">
                            <i class="fas fa-edit" aria-hidden="true"></i>
                        </a>
                    </div>
                    <div class="elements-preview-body ql-editor" id="elementsPreviewBody"></div>
                    <div class="elements-preview-section" id="elementsPreviewResumeWrap" style="display:none">
                        <div class="elements-preview-section-label">
                            <i class="fas fa-align-left" aria-hidden="true"></i> Résumé
                            <button type="button" class="button small element-ai-btn ai-element-summary-btn"
                                id="elementsPreviewAiBtn" data-id="" title="Regénérer le résumé IA"
                                style="margin-left:auto">
                                <i class="fas fa-magic" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="ql-editor elements-preview-resume-body" id="elementsPreviewResumeBody"></div>
                    </div>
                    <div class="elements-preview-section" id="elementsPreviewAiWrap" style="display:none">
                        <button type="button" class="button small element-ai-btn ai-element-summary-btn"
                            id="elementsPreviewAiBtnEmpty" data-id="" title="Générer un résumé IA">
                            <i class="fas fa-magic" aria-hidden="true"></i> Générer un résumé IA
                        </button>
                    </div>
                    <div class="elements-preview-section" id="elementsPreviewSubsWrap" style="display:none">
                        <div class="elements-preview-section-label">
                            <i class="fas fa-sitemap" aria-hidden="true"></i> Sous-éléments
                        </div>
                        <div id="elementsPreviewSubsList"></div>
                    </div>
                </div>
            </div>

        </div>
    </check>

</div>

<script type="application/json" id="elementsJson">{{ @elementsJson | raw }}</script>

<script nonce="{{ @nonce }}">
    (function () {
        var BASE = '{{ @base }}';
        var IS_PRO = document.body.classList.contains('ui-pro');

        // Build flat map: id → element (both parents and subs)
        var elementsData = {};
        try {
            var raw = JSON.parse(document.getElementById('elementsJson').textContent);
            raw.forEach(function (el) {
                elementsData[el.id] = el;
                (el.subs || []).forEach(function (sub) {
                    elementsData[sub.id] = sub;
                });
            });
        } catch (e) { }

        // Preview DOM refs
        var previewEmpty = document.getElementById('elementsPreviewEmpty');
        var previewContent = document.getElementById('elementsPreviewContent');
        var previewBreadcrumb = document.getElementById('elementsPreviewBreadcrumb');
        var previewTitle = document.getElementById('elementsPreviewTitle');
        var previewBody = document.getElementById('elementsPreviewBody');
        var previewEdit = document.getElementById('elementsPreviewEdit');
        var previewResumeWrap = document.getElementById('elementsPreviewResumeWrap');
        var previewResumeBody = document.getElementById('elementsPreviewResumeBody');
        var previewAiBtn = document.getElementById('elementsPreviewAiBtn');
        var previewAiWrap = document.getElementById('elementsPreviewAiWrap');
        var previewAiBtnEmpty = document.getElementById('elementsPreviewAiBtnEmpty');
        var previewSubsWrap = document.getElementById('elementsPreviewSubsWrap');
        var previewSubsList = document.getElementById('elementsPreviewSubsList');

        function stripTags(html) {
            var d = document.createElement('div');
            d.innerHTML = html || '';
            return d.textContent || d.innerText || '';
        }

        function hasContent(html) {
            return stripTags(html).trim().length > 0;
        }

        function showPreview(id) {
            var el = elementsData[id];
            if (!el) return;

            // Breadcrumb: show parent name for sub-elements
            if (el.parent_id && elementsData[el.parent_id]) {
                previewBreadcrumb.textContent = '↳ ' + stripTags(elementsData[el.parent_id].title || '');
                previewBreadcrumb.style.display = '';
            } else {
                previewBreadcrumb.style.display = 'none';
            }

            previewTitle.textContent = stripTags(el.title || '');
            previewBody.innerHTML = el.content || '<p class="text-muted-para">Aucun contenu.</p>';
            previewEdit.href = BASE + '/element/' + id;

            // Resume + AI buttons
            var isParent = !el.parent_id && (el.subs || []).length > 0;
            if (el.resume && hasContent(el.resume)) {
                previewResumeBody.innerHTML = el.resume;
                previewResumeWrap.style.display = '';
                if (previewAiBtn) previewAiBtn.dataset.id = id;
                if (previewAiWrap) previewAiWrap.style.display = 'none';
            } else {
                previewResumeWrap.style.display = 'none';
                if (previewAiWrap) {
                    previewAiWrap.style.display = isParent ? '' : 'none';
                    if (previewAiBtnEmpty) previewAiBtnEmpty.dataset.id = id;
                }
            }

            // Sub-elements (only for parents)
            var subs = el.subs || [];
            if (!el.parent_id && subs.length > 0) {
                previewSubsList.innerHTML = '';
                subs.forEach(function (sub) {
                    var row = document.createElement('div');
                    row.className = 'elements-preview-sub-row';
                    row.dataset.id = sub.id;
                    var span = document.createElement('span');
                    span.textContent = stripTags(sub.title || '');
                    row.appendChild(span);
                    var a = document.createElement('a');
                    a.href = BASE + '/element/' + sub.id;
                    a.className = 'button small';
                    a.title = 'Modifier';
                    a.innerHTML = '<i class="fas fa-edit" aria-hidden="true"></i>';
                    a.addEventListener('click', function (e) { e.stopPropagation(); });
                    row.appendChild(a);
                    row.addEventListener('click', function () {
                        setActive(null, parseInt(this.dataset.id, 10));
                        showPreview(parseInt(this.dataset.id, 10));
                    });
                    previewSubsList.appendChild(row);
                });
                previewSubsWrap.style.display = '';
            } else {
                previewSubsWrap.style.display = 'none';
            }

            previewEmpty.style.display = 'none';
            previewContent.style.display = '';
        }

        // Manage active state across all selectable rows
        function setActive(parentId, subId) {
            document.querySelectorAll('.element-list-item').forEach(function (el) {
                el.classList.toggle('is-active', parseInt(el.dataset.id, 10) === parentId);
            });
            document.querySelectorAll('.element-sub-item').forEach(function (el) {
                el.classList.toggle('is-active', parseInt(el.dataset.id, 10) === subId);
            });
            document.querySelectorAll('.elements-preview-sub-row').forEach(function (el) {
                el.classList && el.classList.toggle('is-active', parseInt(el.dataset.id, 10) === subId);
            });
        }

        document.querySelectorAll('.export-toggle-list').forEach(function (cb) {
            cb.addEventListener('change', function () {
                var pid = this.dataset.pid;
                var id = parseInt(this.dataset.id, 10);
                var type = this.dataset.type;
                var checked = this.checked;
                fetch(BASE + '/project/' + pid + '/export-toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': window.CSRF_TOKEN },
                    body: JSON.stringify({ id: id, type: type, is_exported: checked ? 1 : 0 })
                }).then(function (r) {
                    if (!r.ok) { cb.checked = !checked; }
                });
            });
        });

        // Expand/collapse sub-element lists
        document.querySelectorAll('.js-expand-subs').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var subList = document.getElementById(this.dataset.target);
                if (!subList) return;
                var isOpen = subList.style.display !== 'none';
                subList.style.display = isOpen ? 'none' : '';
                var icon = this.querySelector('i');
                if (icon) icon.className = isOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
            });
        });

        // Parent item click
        document.querySelectorAll('.element-list-item').forEach(function (item) {
            item.addEventListener('click', function () {
                var id = parseInt(this.dataset.id, 10);
                if (!IS_PRO) {
                    window.location.href = BASE + '/element/' + id;
                    return;
                }
                setActive(id, null);
                showPreview(id);
            });
            item.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.click(); }
            });
        });

        // Sub-item click
        document.querySelectorAll('.element-sub-item').forEach(function (item) {
            item.addEventListener('click', function () {
                var id = parseInt(this.dataset.id, 10);
                if (!IS_PRO) {
                    window.location.href = BASE + '/element/' + id;
                    return;
                }
                setActive(null, id);
                showPreview(id);
            });
            item.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.click(); }
            });
        });

        // AI summary — shared function
        var aiSystemPrompt = {{ @aiSystemPrompt ? json_encode(@aiSystemPrompt) : '""' }};

        function runAiSummary(elementId, btn) {
            if (!elementId) return;
            var icon = btn.querySelector('i');
            if (!confirm('Voulez-vous générer un résumé basé sur les sous-éléments ? Cela remplacera le résumé actuel.')) {
                return;
            }
            if (icon) icon.className = 'fas fa-spinner fa-spin';
            btn.disabled = true;

            fetch(BASE + '/ai/summarize-element', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': window.CSRF_TOKEN },
                body: JSON.stringify({ element_id: elementId, system_prompt: aiSystemPrompt })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (icon) icon.className = 'fas fa-magic';
                btn.disabled = false;
                if (data.success) {
                    window.location.reload();
                } else {
                    alert('Erreur : ' + (data.error || 'Erreur inconnue'));
                }
            })
            .catch(function (err) {
                if (icon) icon.className = 'fas fa-magic';
                btn.disabled = false;
                console.error(err);
                alert('Erreur de communication avec le serveur.');
            });
        }

        // Boutons AI dans la liste (toujours visibles sur les parents)
        document.querySelectorAll('.element-list-item .ai-element-summary-btn').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                runAiSummary(this.dataset.id, this);
            });
        });

        // Bouton AI dans le panneau preview (régénérer)
        if (previewAiBtn) {
            previewAiBtn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                runAiSummary(this.dataset.id, this);
            });
        }

        // Bouton AI dans le panneau preview (générer — pas encore de résumé)
        if (previewAiBtnEmpty) {
            previewAiBtnEmpty.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                runAiSummary(this.dataset.id, this);
            });
        }
    })();
</script>
