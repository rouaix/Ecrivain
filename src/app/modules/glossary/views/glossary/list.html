<div class="edit-page-layout">

    <set pageIcon="book" />
    <set pageTitle="Lexique" />
    <set backUrl="{{ @base.'/project/'.@project.id }}" />
    <set createUrl="{{ @base.'/project/'.@project.id.'/glossary/create' }}" />
    <set createTitle="Nouveau terme" />
    <include href="_page-header.html" />

    <check if="{{ @count == 0 }}">
        <true>
            <set emptyIcon="book" />
            <set emptyMessage="Aucun terme dans le lexique." />
            <set emptyCreateUrl="{{ @base.'/project/'.@project.id.'/glossary/create' }}" />
            <set emptyCreateLabel="Ajouter le premier terme" />
            <include href="_empty-state.html" />
        </true>
        <false>
            <p class="glossary-meta" class="mt-20">{{ @count }} terme(s) au total</p>

            <repeat group="{{ @categories }}" key="{{ @catKey }}" value="{{ @catLabel }}">
                <check if="{{ isset(@grouped[@catKey]) }}">
                    <true>
                        <div class="edit-card glossary-category">
                            <div class="edit-card-section">
                                <h3>{{ @catLabel }}</h3>
                                <table class="data-table glossary-table">
                                    <thead>
                                        <tr>
                                            <th>Terme</th>
                                            <th>Définition</th>
                                            <th class="compact-actions--wide"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <repeat group="{{ @grouped[@catKey] }}" value="{{ @entry }}">
                                            <tr>
                                                <td class="glossary-term">{{ @entry.term }}</td>
                                                <td class="glossary-definition">{{ @entry.definition ?: '—' }}</td>
                                                <td class="compact-actions--wide" class="text-right">
                                                    <a class="button small"
                                                        href="{{ @base }}/project/{{ @project.id }}/glossary/{{ @entry.id }}/edit"
                                                        title="Modifier" title="Modifier le terme"><i
                                                            class="fas fa-edit"></i></a>
                                                    <a class="button small delete js-confirm"
                                                        href="{{ @base }}/project/{{ @project.id }}/glossary/{{ @entry.id }}/delete"
                                                        data-confirm="Supprimer le terme « {{ @entry.term }} » ?"
                                                        title="Supprimer" title="Supprimer le terme"><i
                                                            class="fas fa-trash"></i></a>
                                                </td>
                                            </tr>
                                        </repeat>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </true>
                </check>
            </repeat>
        </false>
    </check>

</div>
