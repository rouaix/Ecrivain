<div class="edit-page-layout">
    <div class="edit-header">
        <h2><i class="fas fa-envelope-open-text" aria-hidden="true"></i> Mes invitations &amp; collaborations</h2>
    </div>

    <div class="edit-card" class="mt-20">
        <div class="edit-card-section">
            <check if="{{ count(@invitations) == 0 }}">
                <p class="text-muted-para" class="empty-state-block">
                    <i class="fas fa-inbox" aria-hidden="true" style="font-size:2rem;opacity:.3;display:block;margin-bottom:.5rem"></i>
                    Aucune invitation reçue.
                </p>
            </check>

            <check if="{{ count(@invitations) > 0 }}">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Projet</th>
                            <th>Propriétaire</th>
                            <th>Statut</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <repeat group="{{ @invitations }}" value="{{ @inv }}">
                            <tr>
                                <td><strong>{{ @inv.project_title | esc }}</strong></td>
                                <td>{{ @inv.owner_username | esc }}</td>
                                <td>
                                    <check if="{{ @inv.status == 'accepted' }}">
                                        <span class="badge badge-success">Accepté</span>
                                    </check>
                                    <check if="{{ @inv.status == 'pending' }}">
                                        <span class="badge badge-warning">En attente</span>
                                    </check>
                                    <check if="{{ @inv.status == 'declined' }}">
                                        <span class="badge badge-error">Refusé</span>
                                    </check>
                                </td>
                                <td>{{ @inv.created_at }}</td>
                                <td>
                                    <check if="{{ @inv.status == 'accepted' }}">
                                        <a href="{{ @base }}/project/{{ @inv.project_id }}" class="button small"
                                            title="Voir le projet" title="Voir le projet">
                                            <i class="fas fa-eye" aria-hidden="true"></i> Voir
                                        </a>
                                        <a href="{{ @base }}/project/{{ @inv.project_id }}/collab/mes-demandes"
                                            class="button small secondary" title="Mes demandes" title="Mes demandes">
                                            <i class="fas fa-paper-plane" aria-hidden="true"></i> Mes demandes
                                        </a>
                                    </check>
                                    <check if="{{ @inv.status == 'pending' }}">
                                        <form method="post" action="{{ @base }}/collab/invitation/{{ @inv.id }}/accept"
                                            class="d-inline">
                                            <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">
                                            <button type="submit" class="button small" title="Accepter l'invitation"
                                                title="Accepter l'invitation">Accepter</button>
                                        </form>
                                        <form method="post" action="{{ @base }}/collab/invitation/{{ @inv.id }}/decline"
                                            class="d-inline">
                                            <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">
                                            <button type="submit" class="button small secondary"
                                                title="Refuser l'invitation"
                                                title="Refuser l'invitation">Refuser</button>
                                        </form>
                                    </check>
                                </td>
                            </tr>
                        </repeat>
                    </tbody>
                </table>
            </check>
        </div>
    </div>
</div>
