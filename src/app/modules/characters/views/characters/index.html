<div class="edit-header">

    <h2>Personnages : {{ @project.title }}</h2>

    <span>

        <a href="{{ @base }}/project/{{ @project.id }}/characters/relations" class="button secondary"
            title="Graphe des relations" title="Graphe des relations">
            <i class="fas fa-project-diagram" aria-hidden="true"></i>
        </a>

        <a href="{{ @base }}/project/{{ @project.id }}/character/create" class="button" title="Nouveau personnage"
            title="Nouveau personnage"><i class="fas fa-plus" aria-hidden="true"></i></a>

        <a href="{{ @base }}/project/{{ @project.id }}" class="button" title="Retour au projet"
            title="Retour au projet"><i class="fas fa-arrow-left" aria-hidden="true"></i></a>

    </span>

</div>

<check if="{{ empty(@characters) }}">

    <true>

        <div class="panel-empty">

            <p>Aucun personnage créé pour ce projet.</p>

        </div>

    </true>

    <false>

        <div class="characters-grid">

            <repeat group="{{ @characters }}" value="{{ @char }}">

                <div class="character-card">

                    <check if="{{ @char.avatar }}">
                        <div class="character-avatar-wrap">
                            <img class="character-avatar" src="{{ @base }}/public/{{ @char.avatar | esc }}" alt="{{ @char.name | esc }}">
                        </div>
                    </check>

                    <div class="character-header">

                        <h3 class="character-name">{{ @char.name | esc }}<check if="{{ @char.group_name }}"><span class="character-group-badge">{{ @char.group_name | esc }}</span></check>

                            <div class="character-actions">

                                <a class="button small" href="{{ @base }}/character/{{ @char.id }}/edit"
                                    title="Modifier" title="Modifier le personnage"><i class="fas fa-edit" aria-hidden="true"></i></a>

                                <a class="button small delete js-confirm"
                                    href="{{ @base }}/character/{{ @char.id }}/delete"
                                    data-confirm="Confirmer la suppression de ce personnage ?" title="Supprimer"
                                    title="Supprimer le personnage"><i class="fas fa-trash" aria-hidden="true"></i></a>

                            </div>

                        </h3>

                    </div>

                    <div class="character-description">

                        {{ @char.description | raw }}

                    </div>

                    <div class="character-actions">

                        <a class="button small" href="{{ @base }}/character/{{ @char.id }}/edit" title="Modifier"
                            title="Modifier le personnage"><i class="fas fa-edit" aria-hidden="true"></i></a>

                        <a class="button small delete js-confirm" href="{{ @base }}/character/{{ @char.id }}/delete"
                            data-confirm="Confirmer la suppression de ce personnage ?" title="Supprimer"
                            title="Supprimer le personnage"><i class="fas fa-trash" aria-hidden="true"></i></a>

                    </div>

                </div>

            </repeat>

        </div>

    </false>

</check>

<script nonce="{{ @nonce }}">

    document.addEventListener('DOMContentLoaded', function () {

        document.querySelectorAll('.js-confirm').forEach(function (el) {

            el.addEventListener('click', function (e) {

                if (!confirm(this.dataset.confirm || 'Confirmer ?')) {

                    e.preventDefault();

                }

            });

        });

    });

</script>

</content>
