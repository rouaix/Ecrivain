<div class="edit-header">
    <h2>
        <i class="fas fa-{{ @pageIcon }}" aria-hidden="true"></i>
        {{ @pageTitle | esc }}
    </h2>
    <div class="header-actions">
        <check if="{{ isset(@backUrl) }}">
            <a href="{{ @backUrl }}" class="button secondary" title="{{ isset(@backLabel) ? @backLabel : 'Retour' }}">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
        </check>
        <check if="{{ @isOwner && isset(@createUrl) }}">
            <a href="{{ @createUrl }}" class="button" title="{{ isset(@createTitle) ? @createTitle : 'Créer' }}">
                <i class="fas fa-plus" aria-hidden="true"></i>
                <check if="{{ isset(@createLabel) }}"> {{ @createLabel }}</check>
            </a>
        </check>
    </div>
</div>
