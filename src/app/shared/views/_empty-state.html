<div class="edit-card mt-20">
    <p class="text-muted-para empty-state-block">
        <i class="fas fa-{{ @emptyIcon }}" aria-hidden="true"
            style="font-size:2rem;opacity:.3;display:block;margin-bottom:.5rem"></i>
        {{ @emptyMessage }}
        <check if="{{ @isOwner && isset(@emptyCreateUrl) }}">
            <a href="{{ @emptyCreateUrl }}" class="button mt-10">
                <i class="fas fa-plus" aria-hidden="true"></i> {{ @emptyCreateLabel }}
            </a>
        </check>
    </p>
</div>
